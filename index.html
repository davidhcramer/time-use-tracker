<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Week Tracker</title>
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="description" content="Track one week of your life in six-minute increments — time, money, and media.">
<meta name="theme-color" content="#f7f6f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ---------- tokens ---------- */
:root {
  color-scheme: light;
  --page: #f7f6f2;
  --surface: #fcfcfb;
  --surface-2: #f0efec;
  --ink: #141310;
  --ink-2: #52514e;
  --muted: #898781;
  --hairline: #e1e0d9;
  --accent: #1c5cab;
  --accent-ink: #ffffff;
  --danger: #d03b3b;
  --c0:#2a78d6; --c1:#008300; --c2:#e87ba4; --c3:#eda100;
  --c4:#1baf7a; --c5:#eb6834; --c6:#4a3aa7; --c7:#e34948; --c8:#5f7286;
  --shadow: 0 -8px 32px rgba(20,19,16,.14);
  --sheet-radius: 20px;
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    color-scheme: dark;
    --page: #0d0d0d;
    --surface: #1a1a19;
    --surface-2: #242422;
    --ink: #f4f3ee;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hairline: #2c2c2a;
    --accent: #3987e5;
    --accent-ink: #0d0d0d;
    --danger: #e66767;
    --c0:#3987e5; --c1:#008300; --c2:#d55181; --c3:#c98500;
    --c4:#199e70; --c5:#d95926; --c6:#9085e9; --c7:#e66767; --c8:#94a7bd;
    --shadow: 0 -8px 32px rgba(0,0,0,.5);
  }
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --page: #0d0d0d;
  --surface: #1a1a19;
  --surface-2: #242422;
  --ink: #f4f3ee;
  --ink-2: #c3c2b7;
  --muted: #898781;
  --hairline: #2c2c2a;
  --accent: #3987e5;
  --accent-ink: #0d0d0d;
  --danger: #e66767;
  --c0:#3987e5; --c1:#008300; --c2:#d55181; --c3:#c98500;
  --c4:#199e70; --c5:#d95926; --c6:#9085e9; --c7:#e66767; --c8:#94a7bd;
  --shadow: 0 -8px 32px rgba(0,0,0,.5);
}

/* ---------- base ---------- */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--page);
  color: var(--ink);
  font-family: "Bricolage Grotesque", system-ui, -apple-system, "Segoe UI", sans-serif;
  font-size: 16px;
  line-height: 1.35;
  overscroll-behavior-y: none;
}
.mono { font-family: "Spline Sans Mono", ui-monospace, Consolas, monospace; }
button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
}
input, select {
  font: inherit; color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 10px 12px;
  width: 100%;
}
input::placeholder { color: var(--muted); }

#app {
  max-width: 480px; margin: 0 auto; min-height: 100dvh;
  display: flex; flex-direction: column;
  background: var(--page);
}
@media (min-width: 520px) {
  #app { border-left: 1px solid var(--hairline); border-right: 1px solid var(--hairline); }
}

/* ---------- header ---------- */
header {
  position: sticky; top: 0; z-index: 20;
  background: var(--page);
  border-bottom: 1px solid var(--hairline);
  padding: calc(env(safe-area-inset-top) + 10px) 14px 0;
}
.brand-row { display: flex; align-items: baseline; justify-content: space-between; }
.wordmark {
  font-weight: 750; font-size: 22px; letter-spacing: -0.02em;
  font-variation-settings: "opsz" 40;
}
.wordmark small { font-weight: 400; color: var(--muted); font-size: 12px; letter-spacing: 0; margin-left: 8px; }
.gear { color: var(--ink-2); padding: 6px; border-radius: 8px; }

.weekbar { display: flex; align-items: center; gap: 2px; padding: 8px 0 10px; }
.wk-arrow { color: var(--ink-2); padding: 6px 8px; border-radius: 8px; flex: none; font-size: 18px; line-height: 1; }
.daychips { display: flex; gap: 4px; flex: 1; justify-content: space-between; }
.daychip {
  flex: 1; text-align: center; padding: 5px 0 4px; border-radius: 10px;
  color: var(--ink-2); border: 1px solid transparent; min-width: 0;
}
.daychip .dw { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.daychip .dn { display: block; font-size: 15px; font-weight: 600; }
.daychip .dot { display: block; width: 4px; height: 4px; border-radius: 2px; margin: 2px auto 0; background: transparent; }
.daychip.has .dot { background: var(--accent); }
.daychip.today .dn { color: var(--accent); }
.daychip.sel { background: var(--surface); border-color: var(--hairline); color: var(--ink); }

/* ---------- views ---------- */
main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.view { display: none; flex: 1; }
.view.active { display: block; }

/* ---------- tape ---------- */
#tape { padding-bottom: 72px; }
.hour-block { border-bottom: 1px solid var(--hairline); }
.slot {
  display: flex; align-items: stretch; width: 100%; text-align: left;
  min-height: 34px; position: relative;
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
}
.slot.preview { background: color-mix(in oklab, var(--catcol) 10%, transparent); }
body.dragging-slot { cursor: ns-resize; }
.slot .t {
  flex: none; width: 64px; padding: 8px 10px 0 14px;
  font-size: 11px; color: var(--muted);
  font-family: "Spline Sans Mono", ui-monospace, monospace;
}
.slot .t b { color: var(--ink-2); font-weight: 600; font-size: 12px; }
.slot .rail { flex: none; width: 4px; border-radius: 2px; margin: 3px 0; background: transparent; }
.slot.filled .rail { background: var(--catcol); }
.slot.filled.tex .rail {
  background: repeating-linear-gradient(45deg, var(--catcol) 0 3px, transparent 3px 6px);
}
.slot .body { flex: 1; padding: 7px 14px 7px 10px; border-top: 1px dashed var(--hairline); }
.slot:first-child .body { border-top: none; }
.slot .cat { font-size: 14px; font-weight: 600; }
.slot .empty-rule { color: transparent; font-size: 14px; }
.slot:active { background: var(--surface-2); }
.slot.now { background: color-mix(in oklab, var(--accent) 7%, transparent); }
.slot.now::after {
  content: "now"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--accent);
}

/* ---------- lists (money / media) ---------- */
.listview { padding: 14px 14px 72px; }
.totals { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.total-tile {
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px;
  padding: 10px 14px; flex: 1; min-width: 120px;
}
.total-tile .lab { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.total-tile .val { font-size: 20px; font-weight: 700; font-family: "Spline Sans Mono", ui-monospace, monospace; }
.day-group { margin-bottom: 14px; }
.day-group h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 6px 2px; font-weight: 600; }
.entry {
  display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px;
  padding: 10px 12px; margin-bottom: 6px;
}
.entry .when { flex: none; font-size: 12px; color: var(--muted); font-family: "Spline Sans Mono", ui-monospace, monospace; }
.entry .what { flex: 1; min-width: 0; }
.entry .what .p1 { display: block; font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry .what .p2 { display: block; font-size: 12px; color: var(--ink-2); }
.entry .amt { flex: none; font-weight: 600; font-family: "Spline Sans Mono", ui-monospace, monospace; font-size: 14px; }
.empty-note { color: var(--ink-2); padding: 28px 10px; text-align: center; font-size: 14px; }

/* ---------- week / summary ---------- */
.wrap { padding: 14px 14px 72px; }
.tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.tile { background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; padding: 10px 12px; }
.tile .lab { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.tile .val { font-size: 19px; font-weight: 700; font-family: "Spline Sans Mono", ui-monospace, monospace; }
.tile .sub { font-size: 11px; color: var(--ink-2); }
section.card {
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 16px;
  padding: 14px; margin-bottom: 12px;
}
section.card h2 { font-size: 13px; margin: 0 0 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-2); font-weight: 700; }
#barcode { width: 100%; display: block; }
.bc-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 10px; }
.bc-legend span { font-size: 11px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 5px; }
.swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; background: var(--catcol); flex: none; }
.swatch.tex { background: repeating-linear-gradient(45deg, var(--catcol) 0 2px, transparent 2px 4px); }
.barrow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.barrow .nm { flex: none; width: 96px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.barrow .nm em { font-style: normal; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.barrow .bar { flex: 1; height: 8px; border-radius: 0 4px 4px 0; background: var(--surface-2); position: relative; }
.barrow .bar i { position: absolute; inset: 0 auto 0 0; border-radius: 0 4px 4px 0; background: var(--catcol); }
.barrow .bar i.tex { background: repeating-linear-gradient(45deg, var(--catcol) 0 3px, color-mix(in oklab, var(--catcol) 35%, var(--surface)) 3px 6px); }
.barrow .vv { flex: none; width: 52px; text-align: right; font-size: 12px; font-family: "Spline Sans Mono", ui-monospace, monospace; color: var(--ink-2); }
.btn-secondary {
  display: block; width: 100%; text-align: center; padding: 12px;
  border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface);
  font-weight: 600; font-size: 14px; margin-top: 4px;
}

/* ---------- nav ---------- */
nav {
  position: sticky; bottom: 0; z-index: 20;
  display: flex; background: var(--page); border-top: 1px solid var(--hairline);
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1; padding: 9px 0 7px; font-size: 11px; font-weight: 600; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
nav button svg { width: 21px; height: 21px; }
nav button.active { color: var(--accent); }

/* ---------- sheets ---------- */
#backdrop {
  position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.45);
  opacity: 0; pointer-events: none; transition: opacity .18s;
}
#backdrop.open { opacity: 1; pointer-events: auto; }
#sheet {
  position: fixed; left: 50%; bottom: 0; z-index: 50; width: 100%; max-width: 480px;
  transform: translate(-50%, 105%); transition: transform .22s cubic-bezier(.3,1,.4,1);
  background: var(--surface); border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
  box-shadow: var(--shadow);
  max-height: 88dvh; display: flex; flex-direction: column;
}
#sheet.open { transform: translate(-50%, 0); }
@media (prefers-reduced-motion: reduce) {
  #sheet, #backdrop { transition: none; }
}
.sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 4px; }
.sheet-head h2 { font-size: 17px; margin: 0; font-weight: 700; }
.sheet-head .sub { font-size: 12px; color: var(--muted); font-family: "Spline Sans Mono", ui-monospace, monospace; }
.xbtn { color: var(--muted); font-size: 22px; line-height: 1; padding: 4px 6px; }
.sheet-body { padding: 8px 18px calc(18px + env(safe-area-inset-bottom)); overflow-y: auto; }
.fieldlab { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 14px 0 6px; font-weight: 700; }
.fieldlab:first-child { margin-top: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 999px; border: 1px solid var(--hairline);
  background: var(--surface); font-size: 14px; font-weight: 600;
}
.chip .swatch { width: 9px; height: 9px; }
.chip.sel { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 10%, var(--surface)); }
.chip.add { color: var(--accent); border-style: dashed; }
.chip.small { padding: 6px 11px; font-size: 13px; }
.row2 { display: flex; gap: 8px; }
.row2 > * { flex: 1; }
.timerow { display: flex; gap: 8px; }
.timerow label { flex: 1; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; }
.timerow label.tight { flex: 0 0 118px; }
.timerow select, .timerow input { margin-top: 5px; width: 100%; display: block; font-weight: 400; letter-spacing: 0; text-transform: none; font-size: 16px; }
.btn-mini {
  background: var(--accent); color: var(--accent-ink);
  border-radius: 10px; font-weight: 700; font-size: 14px; padding: 0 18px; flex: 0 0 auto;
}
.btn-primary {
  display: block; width: 100%; padding: 13px; margin-top: 16px;
  background: var(--accent); color: var(--accent-ink);
  border-radius: 12px; font-weight: 700; font-size: 15px; text-align: center;
}
.btn-danger { color: var(--danger); font-weight: 600; font-size: 14px; padding: 12px; width: 100%; text-align: center; }
.hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
.setrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--hairline); }
.setrow:last-child { border-bottom: none; }
.setrow .lab { font-size: 14px; font-weight: 600; }
.setrow .lab small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; }
.setrow input, .setrow select { width: auto; max-width: 170px; }
details summary.fieldlab { cursor: pointer; list-style-position: outside; }
.catman { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px dashed var(--hairline); }
.catman input { flex: 1; padding: 7px 10px; }
.catman .del { color: var(--danger); font-size: 13px; font-weight: 600; flex: none; }

#toast {
  position: fixed; left: 50%; bottom: calc(120px + env(safe-area-inset-bottom)); transform: translateX(-50%);
  z-index: 60; background: var(--ink); color: var(--page);
  padding: 9px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity .2s; max-width: 88vw; text-align: center;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand-row">
      <div class="wordmark">Week Tracker<small>six minutes at a time</small></div>
      <button class="gear" id="gearBtn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="weekbar">
      <button class="wk-arrow" id="wkPrev" aria-label="Previous week">‹</button>
      <div class="daychips" id="daychips"></div>
      <button class="wk-arrow" id="wkNext" aria-label="Next week">›</button>
    </div>
  </header>

  <main>
    <div class="view" id="view-track"><div id="tape"></div></div>
    <div class="view" id="view-money"><div class="listview" id="moneyList"></div></div>
    <div class="view" id="view-media"><div class="listview" id="mediaList"></div></div>
    <div class="view" id="view-week"><div class="wrap" id="weekWrap"></div></div>
  </main>

  <nav id="nav">
    <button data-tab="track" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.2 2.4"/></svg>Time</button>
    <button data-tab="money"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5v17M16.2 6.5H10a2.75 2.75 0 0 0 0 5.5h4a2.75 2.75 0 0 1 0 5.5H7.3"/></svg>Money</button>
    <button data-tab="media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9.5v5l4.5-2.5z"/></svg>Media</button>
    <button data-tab="week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 20V10M10 20V4M15 20v-8M20 20V7"/></svg>Summary</button>
  </nav>
</div>

<div id="backdrop"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================== store ============================== */
const LSKEY = "tenths.v1";
const PALN = 9;
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

const DEFAULT_CATS = ["Sleep","Personal Care","Work","Commute","Exercise","Housework","Childcare",
  "Looking at Phone","Video Game","Reading","Eating","Preparing Food","Playing with kids",
  "Conversation","Life Admin/Planning","Religious devotion","Shopping"];
const MEDIA_TYPES = ["Video","TV / film","Social","Podcast","Music","Reading","News","Games","Other"];

function freshStore() {
  return {
    v: 1,
    profile: { name: "", theme: "auto", weekStart: 1, currencies: ["USD","EUR","GBP"], defaultCurrency: "USD" },
    categories: DEFAULT_CATS.map((n, i) => ({ id: "c" + i, name: n, slot: i })),
    slots: {}, slotsMeta: {},
    money: [], media: [], deleted: [],
    meta: { updatedAt: Date.now() },
  };
}
const DEMO = new URLSearchParams(location.search).has("demo");
let S;
try { S = JSON.parse(localStorage.getItem(LSKEY)) || freshStore(); }
catch (e) { S = freshStore(); }
if (!S.deleted) S.deleted = [];
/* one-time top-up to the 2026-07-21 base category list; unused old defaults are dropped */
if (!S.catsV2) {
  const used = new Set(Object.values(S.slots || {}).flatMap(d => Object.values(d)));
  S.categories = S.categories.filter(c => DEFAULT_CATS.includes(c.name) || used.has(c.id));
  DEFAULT_CATS.forEach(n => {
    if (!S.categories.some(c => c.name === n)) S.categories.push({ id: uid(), name: n, slot: nextSlotIdx() });
  });
  S.catsV2 = 1;
}
if (DEMO) S = demoStore();

function save() {
  if (DEMO) return; // demo data is never written to this device
  S.meta.updatedAt = Date.now();
  localStorage.setItem(LSKEY, JSON.stringify(S));
  scheduleSync();
}

function demoStore() {
  const d = freshStore();
  d.profile.name = "Demo";
  const cat = (n) => d.categories.find(c => c.name === n).id;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let back = 0; back < 3; back++) {
    const k = (function(x){ return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); })(new Date(today.getFullYear(), today.getMonth(), today.getDate() - back));
    const day = {};
    const put = (from, to, c) => { for (let i = from; i < to; i++) day[String(Math.floor(i/10)).padStart(2,"0")+":"+String((i%10)*6).padStart(2,"0")] = c; };
    put(0, 70, cat("Sleep")); put(70, 80, cat("Eating")); put(80, 90, cat("Commute"));
    put(90, 170, cat("Work")); put(170, 185, cat("Playing with kids")); put(185, 200, cat("Video Game"));
    put(200, 225, cat("Conversation")); put(230, 240, cat("Sleep"));
    d.slots[k] = day; d.slotsMeta[k] = Date.now();
  }
  const ts = (back, h) => new Date(today.getFullYear(), today.getMonth(), today.getDate() - back, h, 12).getTime();
  d.money = [
    { id: "m1", ts: ts(0, 12), up: 1, amount: 14.5, currency: "USD", purpose: "Food" },
    { id: "m2", ts: ts(1, 8),  up: 1, amount: 4.2,  currency: "USD", purpose: "Transport" },
    { id: "m3", ts: ts(1, 19), up: 1, amount: 62,   currency: "USD", purpose: "Groceries" },
  ];
  d.media = [
    { id: "d1", ts: ts(0, 13), up: 1, title: "Morning news roundup", type: "News", minutes: 15 },
    { id: "d2", ts: ts(0, 21), up: 1, title: "The Rest Is History", type: "Podcast", minutes: 55 },
    { id: "d3", ts: ts(1, 22), up: 1, title: "Instagram scroll", type: "Social", minutes: 25 },
  ];
  return d;
}

/* daily snapshot: state as of first open today; keep 10 */
(function snapshot() {
  const k = "tenths.snap." + dateKey(new Date());
  if (!localStorage.getItem(k) && localStorage.getItem(LSKEY)) {
    try { localStorage.setItem(k, localStorage.getItem(LSKEY)); } catch (e) {}
  }
  const snaps = Object.keys(localStorage).filter(x => x.startsWith("tenths.snap.")).sort();
  while (snaps.length > 10) localStorage.removeItem(snaps.shift());
})();

/* ============================== dates ============================== */
function dateKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function fromKey(k) { const [y, m, d] = k.split("-").map(Number); return new Date(y, m - 1, d); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function weekDates(anchor) {
  const ws = S.profile.weekStart; // 1 = Monday, 0 = Sunday
  const d = new Date(anchor); d.setHours(0,0,0,0);
  const shift = (d.getDay() - ws + 7) % 7;
  const start = addDays(d, -shift);
  return Array.from({ length: 7 }, (_, i) => addDays(start, i));
}
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function slotLabel(i) { return String(Math.floor(i / 10)).padStart(2, "0") + ":" + String((i % 10) * 6).padStart(2, "0"); }
function nowSlotIndex() { const n = new Date(); return Math.floor((n.getHours() * 60 + n.getMinutes()) / 6); }
function fmtTime(ts) { const d = new Date(ts); return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); }

/* ============================== ui state ============================== */
let selDate = new Date(); selDate.setHours(0,0,0,0);
let tab = "track";
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function catById(id) { return S.categories.find(c => c.id === id); }
function catColorVar(cat) { return "var(--c" + (cat.slot % PALN) + ")"; }
function catIsTex(cat) { return cat.slot >= PALN; }
function nextSlotIdx() {
  const used = S.categories.map(c => c.slot);
  for (let i = 0; i < PALN * 2; i++) if (!used.includes(i)) return i;
  return S.categories.length % (PALN * 2);
}

function toast(msg, ms) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), ms || 2200);
}

/* ============================== header ============================== */
function renderWeekbar() {
  const days = weekDates(selDate);
  const tk = dateKey(new Date());
  $("#daychips").innerHTML = days.map(d => {
    const k = dateKey(d);
    const has = (S.slots[k] && Object.keys(S.slots[k]).length) ||
                S.money.some(m => dateKey(new Date(m.ts)) === k) ||
                S.media.some(m => dateKey(new Date(m.ts)) === k);
    return `<button class="daychip ${k === dateKey(selDate) ? "sel" : ""} ${k === tk ? "today" : ""} ${has ? "has" : ""}" data-k="${k}">
      <span class="dw">${DOW[d.getDay()]}</span><span class="dn">${d.getDate()}</span><span class="dot"></span></button>`;
  }).join("");
  $("#daychips").querySelectorAll(".daychip").forEach(b =>
    b.addEventListener("click", () => { selDate = fromKey(b.dataset.k); renderAll(); if (tab === "track") scrollToNow(); }));
}
$("#wkPrev").addEventListener("click", () => { selDate = addDays(selDate, -7); renderAll(); });
$("#wkNext").addEventListener("click", () => { selDate = addDays(selDate, 7); renderAll(); });

/* ============================== tape ============================== */
function renderTape() {
  const k = dateKey(selDate);
  const day = S.slots[k] || {};
  const isToday = k === dateKey(new Date());
  const nowI = nowSlotIndex();
  let html = "";
  for (let h = 0; h < 24; h++) {
    html += '<div class="hour-block">';
    for (let j = 0; j < 10; j++) {
      const i = h * 10 + j;
      const lab = slotLabel(i);
      const cid = day[lab];
      const cat = cid ? catById(cid) : null;
      const cls = ["slot"];
      if (cat) { cls.push("filled"); if (catIsTex(cat)) cls.push("tex"); }
      if (isToday && i === nowI) cls.push("now");
      html += `<button class="${cls.join(" ")}" data-i="${i}" ${cat ? `style="--catcol:${catColorVar(cat)}"` : ""}>
        <span class="t">${j === 0 ? "<b>" + lab + "</b>" : lab}</span>
        <span class="rail"></span>
        <span class="body">${cat ? `<span class="cat">${esc(cat.name)}</span>` : `<span class="empty-rule">·</span>`}</span>
      </button>`;
    }
    html += "</div>";
  }
  $("#tape").innerHTML = html;
  $("#tape").querySelectorAll(".slot").forEach(b =>
    b.addEventListener("click", () => { if (!suppressClick) openSlotSheet(+b.dataset.i); }));
}
function scrollToNow() {
  if (new URLSearchParams(location.search).has("noscroll")) return;
  const el = $("#tape .slot.now") || $('#tape .slot[data-i="70"]'); // 07:00 fallback
  if (el) el.scrollIntoView({ block: "center" });
}

/* ---- drag a filled block to extend it (press-hold on touch, drag on mouse) ---- */
let drag = null, pendingDrag = null, suppressClick = false;
function slotElAt(x, y) {
  const el = document.elementFromPoint(x, y);
  const s = el && el.closest ? el.closest(".slot") : null;
  return s && $("#tape").contains(s) ? s : null;
}
function paintDragPreview() {
  const day = S.slots[dateKey(selDate)] || {};
  const lo = Math.min(drag.from, drag.to), hi = Math.max(drag.from, drag.to);
  $("#tape").querySelectorAll(".slot").forEach(el => {
    const i = +el.dataset.i;
    const inR = i >= lo && i <= hi;
    const cid = inR ? drag.cid : day[slotLabel(i)];
    const c = cid ? catById(cid) : null;
    el.classList.toggle("filled", !!c);
    el.classList.toggle("tex", !!c && catIsTex(c));
    el.classList.toggle("preview", inR);
    if (c) el.style.setProperty("--catcol", catColorVar(c)); else el.style.removeProperty("--catcol");
    el.querySelector(".body").innerHTML = c ? `<span class="cat">${esc(c.name)}</span>` : `<span class="empty-rule">·</span>`;
  });
}
function startSlotDrag(i, cid, x, y) {
  drag = { from: i, to: i, cid, lastX: x, lastY: y };
  document.body.classList.add("dragging-slot");
  if (navigator.vibrate) navigator.vibrate(10);
  paintDragPreview();
}
function dragMoveTo(x, y) {
  drag.lastX = x; drag.lastY = y;
  const el = slotElAt(x, y);
  if (el) { const j = +el.dataset.i; if (j !== drag.to) { drag.to = j; paintDragPreview(); } }
}
$("#tape").addEventListener("pointerdown", (e) => {
  const el = slotElAt(e.clientX, e.clientY);
  if (!el) return;
  const i = +el.dataset.i;
  const cid = (S.slots[dateKey(selDate)] || {})[slotLabel(i)];
  if (!cid) return;
  const pd = { i, cid, x: e.clientX, y: e.clientY, mouse: e.pointerType === "mouse" };
  pendingDrag = pd;
  if (!pd.mouse) pd.timer = setTimeout(() => {
    if (pendingDrag === pd) { startSlotDrag(pd.i, pd.cid, pd.x, pd.y); pendingDrag = null; }
  }, 300);
});
window.addEventListener("pointermove", (e) => {
  if (pendingDrag) {
    const dx = Math.abs(e.clientX - pendingDrag.x), dy = Math.abs(e.clientY - pendingDrag.y);
    if (pendingDrag.mouse && (dx > 6 || dy > 6)) { startSlotDrag(pendingDrag.i, pendingDrag.cid, e.clientX, e.clientY); pendingDrag = null; }
    else if (!pendingDrag.mouse && (dx > 10 || dy > 10)) { clearTimeout(pendingDrag.timer); pendingDrag = null; } // it's a scroll
  }
  if (drag) dragMoveTo(e.clientX, e.clientY);
});
/* while dragging, the finger must pan the selection, not the page */
document.addEventListener("touchmove", (e) => { if (drag) e.preventDefault(); }, { passive: false });
$("#tape").addEventListener("contextmenu", (e) => { if (drag || pendingDrag) e.preventDefault(); });
window.addEventListener("pointerup", () => {
  if (pendingDrag) { clearTimeout(pendingDrag.timer); pendingDrag = null; }
  if (!drag) return;
  const k = dateKey(selDate);
  const lo = Math.min(drag.from, drag.to), hi = Math.max(drag.from, drag.to);
  if (!S.slots[k]) S.slots[k] = {};
  for (let s = lo; s <= hi; s++) S.slots[k][slotLabel(s)] = drag.cid;
  S.slotsMeta[k] = Date.now();
  drag = null; document.body.classList.remove("dragging-slot");
  suppressClick = true; setTimeout(() => { suppressClick = false; }, 350);
  save(); renderTape(); renderWeekbar();
});
window.addEventListener("pointercancel", () => {
  if (pendingDrag) { clearTimeout(pendingDrag.timer); pendingDrag = null; }
  if (drag) { drag = null; document.body.classList.remove("dragging-slot"); renderTape(); }
});
/* auto-scroll while dragging near the top/bottom edge */
(function dragAutoScroll() {
  if (drag) {
    if (drag.lastY > innerHeight - 90) window.scrollBy(0, 12);
    else if (drag.lastY < 150) window.scrollBy(0, -12);
    dragMoveTo(drag.lastX, drag.lastY);
  }
  requestAnimationFrame(dragAutoScroll);
})();

/* ============================== sheet plumbing ============================== */
function openSheet(html) {
  $("#sheet").innerHTML = html;
  $("#backdrop").classList.add("open");
  $("#sheet").classList.add("open");
  const x = $("#sheet .xbtn"); if (x) x.addEventListener("click", closeSheet);
}
function closeSheet() {
  $("#backdrop").classList.remove("open");
  $("#sheet").classList.remove("open");
}
$("#backdrop").addEventListener("click", closeSheet);
function sheetHead(title, sub) {
  return `<div class="sheet-head"><div><h2>${title}</h2>${sub ? `<span class="sub">${sub}</span>` : ""}</div><button class="xbtn" aria-label="Close">×</button></div>`;
}

/* ============================== slot sheet ============================== */
function timeOpts(from, to, sel) {
  let h = "";
  for (let i = from; i <= to; i++)
    h += `<option value="${i}" ${i === sel ? "selected" : ""}>${i >= 240 ? "24:00" : slotLabel(i)}</option>`;
  return h;
}
function openSlotSheet(i) {
  const k = dateKey(selDate);
  const day = S.slots[k] || {};
  const cur = day[slotLabel(i)];
  const isToday = k === dateKey(new Date());
  const canNow = isToday && i <= nowSlotIndex();
  /* a filled block stands for its whole contiguous run of the same category */
  let runStart = i, runEnd = i + 1;
  if (cur) {
    while (runStart > 0 && day[slotLabel(runStart - 1)] === cur) runStart--;
    while (runEnd < 240 && day[slotLabel(runEnd)] === cur) runEnd++;
  }
  let start = runStart, end = runEnd;
  const d = selDate;
  const chips = S.categories.map(c =>
    `<button class="chip ${c.id === cur ? "sel" : ""}" data-cat="${c.id}" style="--catcol:${catColorVar(c)}">
       <span class="swatch ${catIsTex(c) ? "tex" : ""}"></span>${esc(c.name)}</button>`).join("");
  openSheet(
    sheetHead(`${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}`, `<span id="slotRange"></span>`) +
    `<div class="sheet-body">
      <div class="fieldlab">Time</div>
      <div class="timerow">
        <label>From<select id="tFrom">${timeOpts(0, 239, start)}</select></label>
        <label>To<select id="tTo">${timeOpts(1, 240, end)}</select></label>
      </div>
      <div class="fieldlab">Duration</div>
      <div class="chips" id="fillChips">
        <button class="chip small" data-n="1">6 min</button>
        <button class="chip small" data-n="5">30 min</button>
        <button class="chip small" data-n="10">1 h</button>
        <button class="chip small" data-n="20">2 h</button>
        ${canNow ? `<button class="chip small" data-n="now">→ now</button>` : ""}
      </div>
      <div class="fieldlab">Category</div>
      <div class="chips" id="catChips">${chips}<button class="chip add" id="addCat">+ New</button></div>
      <div id="newCatRow" style="display:none; margin-top:10px;"><div class="row2"><input id="newCatName" placeholder="Category name" maxlength="24"><button class="btn-mini" id="newCatAdd">Add</button></div></div>
      ${cur ? `<button class="btn-primary" id="applyTimes">Update times</button>
      <button class="btn-danger" id="clearSlot">Clear this time</button>` : ""}
    </div>`
  );
  const updRange = () => {
    $("#tFrom").value = start; $("#tTo").value = end;
    $("#slotRange").textContent = slotLabel(start) + "–" + (end >= 240 ? "24:00" : slotLabel(end)) + "  (" + ((end - start) * 0.1).toFixed(1) + " h)";
  };
  updRange();
  /* writes [start,end) as cid; for an existing run, the old run is moved, not duplicated */
  const applyCat = (cid) => {
    if (!S.slots[k]) S.slots[k] = {};
    if (cur) for (let s = runStart; s < runEnd; s++)
      if (S.slots[k][slotLabel(s)] === cur) delete S.slots[k][slotLabel(s)];
    for (let s = start; s < end; s++) S.slots[k][slotLabel(s)] = cid;
    S.slotsMeta[k] = Date.now();
    save(); closeSheet(); renderTape(); renderWeekbar();
  };
  $("#tFrom").addEventListener("change", () => {
    start = +$("#tFrom").value;
    if (end <= start) end = start + 1;
    updRange();
  });
  $("#tTo").addEventListener("change", () => {
    end = +$("#tTo").value;
    if (start >= end) start = end - 1;
    updRange();
  });
  $("#fillChips").querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
    const n = b.dataset.n === "now" ? (nowSlotIndex() - start + 1) : +b.dataset.n;
    end = Math.max(start + 1, Math.min(start + n, 240));
    updRange();
    if (cur) applyCat(cur); // on a logged item, duration chips act immediately
  }));
  $("#catChips").querySelectorAll("[data-cat]").forEach(b => b.addEventListener("click", () => applyCat(b.dataset.cat)));
  const commitNewCat = () => {
    const inp = $("#newCatName");
    if (!inp.value.trim()) { inp.focus(); return; }
    const c = { id: uid(), name: inp.value.trim(), slot: nextSlotIdx() };
    S.categories.push(c); save(); applyCat(c.id);
  };
  $("#addCat").addEventListener("click", () => {
    $("#newCatRow").style.display = "block";
    const inp = $("#newCatName"); inp.focus();
    inp.scrollIntoView({ block: "center", behavior: "smooth" });
  });
  $("#newCatAdd").addEventListener("click", commitNewCat);
  $("#newCatName").addEventListener("keydown", (e) => { if (e.key === "Enter") commitNewCat(); });
  const ap = $("#applyTimes");
  if (ap) ap.addEventListener("click", () => applyCat(cur));
  const cl = $("#clearSlot");
  if (cl) cl.addEventListener("click", () => {
    for (let s = start; s < end; s++) delete S.slots[k][slotLabel(s)];
    S.slotsMeta[k] = Date.now();
    save(); closeSheet(); renderTape(); renderWeekbar();
  });
}

/* ============================== money ============================== */
function fmtMoney(amount, cur) {
  try { return new Intl.NumberFormat(undefined, { style: "currency", currency: cur }).format(amount); }
  catch (e) { return cur + " " + amount.toFixed(2); }
}
/* fmtTime(ts) is already HH:MM — valid as a time-input value */
function tsWithTime(baseTs, hhmm) {
  const d = new Date(baseTs);
  const [h, m] = String(hhmm || "").split(":").map(Number);
  if (!isNaN(h) && !isNaN(m)) d.setHours(h, m, 0, 0);
  return d.getTime();
}
function openMoneySheet(e) {
  const d = new Date(e.ts);
  const curs = [...new Set([S.profile.defaultCurrency, ...S.profile.currencies, e.currency])];
  openSheet(
    sheetHead("Edit spend", `${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}`) +
    `<div class="sheet-body">
      <div class="fieldlab">Amount</div>
      <div class="row2">
        <input id="mAmt" inputmode="decimal" placeholder="0.00" value="${e.amount}">
        <select id="mCur">${curs.map(c => `<option ${c === e.currency ? "selected" : ""}>${c}</option>`).join("")}</select>
      </div>
      <div class="timerow" style="margin-top:10px;">
        <label class="tight">When<input type="time" id="mTime" value="${fmtTime(e.ts)}"></label>
        <label>What for<input id="mPurpose" placeholder="lunch, taxi, birthday gift…" value="${esc(e.purpose)}"></label>
      </div>
      <button class="btn-primary" id="mSave">Save</button>
      <button class="btn-danger" id="mDel">Delete entry</button>
    </div>`
  );
  const q = (sel) => $("#sheet").querySelector(sel); // inline form reuses these ids
  q("#mSave").addEventListener("click", () => {
    const amt = parseFloat(String(q("#mAmt").value).replace(",", "."));
    if (!(amt > 0)) { toast("Enter an amount"); return; }
    const purpose = q("#mPurpose").value.trim();
    if (!purpose) { toast("What was it for?"); return; }
    const rec = {
      id: e.id, ts: tsWithTime(e.ts, q("#mTime").value), up: Date.now(),
      amount: amt, currency: q("#mCur").value, purpose,
    };
    const ix = S.money.findIndex(m => m.id === e.id); S.money[ix] = rec;
    save(); closeSheet(); renderMoney(); renderWeekbar(); toast("Saved");
  });
  q("#mDel").addEventListener("click", () => {
    S.money = S.money.filter(m => m.id !== e.id); S.deleted.push(e.id);
    save(); closeSheet(); renderMoney(); renderWeekbar();
  });
}
function renderMoney() {
  const days = weekDates(selDate).map(dateKey);
  const wk = S.money.filter(m => days.includes(dateKey(new Date(m.ts)))).sort((a, b) => b.ts - a.ts);
  const tot = {};
  wk.forEach(m => tot[m.currency] = (tot[m.currency] || 0) + m.amount);
  const curs = [...new Set([S.profile.defaultCurrency, ...S.profile.currencies])];
  let html = `<section class="card">
    <h2>I just spent money</h2>
    <div class="row2">
      <input id="mAmt" inputmode="decimal" placeholder="0.00">

    </div>
    <div class="timerow" style="margin-top:10px;">

      <label>What for<input id="mPurpose" placeholder="lunch, taxi, birthday gift…"></label>

  if (Object.keys(tot).length)
    html += `<div class="totals">${Object.entries(tot).map(([c, v]) =>
      `<div class="total-tile"><div class="lab">This week · ${c}</div><div class="val">${fmtMoney(v, c)}</div></div>`).join("")}</div>`;
  if (!wk.length) html += `<div class="empty-note">Nothing logged this week.<br>Log it above the moment money leaves your pocket.</div>`;
  else {
    const byDay = {};
    wk.forEach(m => { const k = dateKey(new Date(m.ts)); (byDay[k] = byDay[k] || []).push(m); });
    Object.keys(byDay).sort().reverse().forEach(k => {
      const d = fromKey(k);
      html += `<div class="day-group"><h3>${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}</h3>` +
        byDay[k].map(m => `<button class="entry" data-id="${m.id}">
          <span class="when">${fmtTime(m.ts)}</span>

    });
  }
  $("#moneyList").innerHTML = html;
  $("#mLog").addEventListener("click", () => {
    const amt = parseFloat(String($("#mAmt").value).replace(",", "."));
    if (!(amt > 0)) { toast("Enter an amount"); return; }

    if (!purpose) { toast("What was it for?"); return; }

      id: uid(), ts: tsWithTime(Date.now(), $("#mTime").value), up: Date.now(),
      amount: amt, currency: $("#mCur").value, purpose,

    save(); renderMoney(); renderWeekbar(); toast("Logged " + fmtMoney(amt, rec.currency));

    b.addEventListener("click", () => openMoneySheet(S.money.find(m => m.id === b.dataset.id))));
}

/* ============================== week summary ============================== */
function weekStats() {
  const days = weekDates(selDate).map(dateKey);
  const catH = {};
  let filled = 0;
  days.forEach(k => {
    const day = S.slots[k] || {};
    Object.values(day).forEach(cid => { catH[cid] = (catH[cid] || 0) + 0.1; filled++; });
  });
  const money = S.money.filter(m => days.includes(dateKey(new Date(m.ts))));
  const media = S.media.filter(m => days.includes(dateKey(new Date(m.ts))));
  return { days, catH, filled, money, media };
}
function renderWeek() {
  const { days, catH, filled, money, media } = weekStats();
  const start = fromKey(days[0]), end = fromKey(days[6]);
  const spend = {};
  money.forEach(m => spend[m.currency] = (spend[m.currency] || 0) + m.amount);
  const trackedH = filled * 0.1;

  let html = `<div class="tiles">
    <div class="tile"><div class="lab">Tracked</div><div class="val">${trackedH.toFixed(1)}h</div><div class="sub">of 168h · ${Math.round(trackedH / 168 * 100)}%</div></div>
    <div class="tile"><div class="lab">Spent</div><div class="val">${Object.keys(spend).length ? esc(Object.entries(spend).map(([c, v]) => fmtMoney(v, c)).join(" + ")) : "—"}</div><div class="sub">${money.length} purchases</div></div>
    <div class="tile"><div class="lab">Media</div><div class="val">${media.length}</div><div class="sub">items</div></div>
  </div>`;

  /* barcode */
  const usedCats = S.categories.filter(c => catH[c.id]);
  html += `<section class="card"><h2>Week of ${start.getDate()} ${MON[start.getMonth()]} – ${end.getDate()} ${MON[end.getMonth()]}</h2>
    <canvas id="barcode" height="140" aria-label="Seven day strip of six-minute blocks colored by category" role="img"></canvas>
    <div class="bc-legend">${usedCats.map(c =>
      `<span style="--catcol:${catColorVar(c)}"><span class="swatch ${catIsTex(c) ? "tex" : ""}"></span>${esc(c.name)}</span>`).join("") || '<span>Nothing tracked yet this week.</span>'}</div>
  </section>`;

  /* time by category */
  if (usedCats.length) {
    const maxH = Math.max(...usedCats.map(c => catH[c.id]));
    html += `<section class="card"><h2>Time by category</h2>` +
      usedCats.sort((a, b) => catH[b.id] - catH[a.id]).map(c => `
        <div class="barrow" style="--catcol:${catColorVar(c)}">
          <span class="nm"><span class="swatch ${catIsTex(c) ? "tex" : ""}"></span><em>${esc(c.name)}</em></span>
          <span class="bar"><i class="${catIsTex(c) ? "tex" : ""}" style="width:${Math.max(2, catH[c.id] / maxH * 100)}%"></i></span>
          <span class="vv">${catH[c.id].toFixed(1)}h</span>
        </div>`).join("") + `</section>`;
  }

  /* spend by purpose */
  if (money.length) {
    html += `<section class="card"><h2>Spend by purpose</h2>`;
    Object.keys(spend).forEach(cur => {
      const byP = {};
      money.filter(m => m.currency === cur).forEach(m => byP[m.purpose] = (byP[m.purpose] || 0) + m.amount);
      const rows = Object.entries(byP).sort((a, b) => b[1] - a[1]);
      const maxV = rows[0][1];
      if (Object.keys(spend).length > 1) html += `<div class="fieldlab">${cur}</div>`;
      html += rows.map(([p, v]) => `
        <div class="barrow" style="--catcol:var(--accent)">
          <span class="nm"><em>${esc(p)}</em></span>
          <span class="bar"><i style="width:${Math.max(2, v / maxV * 100)}%"></i></span>
          <span class="vv">${fmtMoney(v, cur)}</span>
        </div>`).join("");
    });
    html += `</section>`;
  }

  /* media by type */
  if (media.length) {
    const byT = {};
    media.forEach(m => byT[m.type] = (byT[m.type] || 0) + 1);
    const rows = Object.entries(byT).sort((a, b) => b[1] - a[1]);
    const maxV = rows[0][1];
    html += `<section class="card"><h2>Media diet</h2>` + rows.map(([t, n]) => `
      <div class="barrow" style="--catcol:var(--accent)">
        <span class="nm"><em>${esc(t)}</em></span>
        <span class="bar"><i style="width:${Math.max(2, n / maxV * 100)}%"></i></span>
        <span class="vv">${n}×</span>
      </div>`).join("") + `</section>`;
  }

  html += `<button class="btn-secondary" id="copySummary">Copy week summary</button>
           <button class="btn-secondary" id="exportBtn">Export / share my data</button>`;
  $("#weekWrap").innerHTML = html;
  drawBarcode(days);
  $("#copySummary").addEventListener("click", copySummary);
  $("#exportBtn").addEventListener("click", exportData);
}
function cssVal(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function drawBarcode(days) {
  const cv = $("#barcode"); if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth || cv.parentElement.clientWidth - 28;
  const H = 140;
  cv.width = W * dpr; cv.height = H * dpr; cv.style.height = H + "px";
  const ctx = cv.getContext("2d"); ctx.scale(dpr, dpr);
  const gut = 26, rowH = 14, gap = 6;
  const bw = (W - gut) / 240;
  ctx.font = "600 10px 'Spline Sans Mono', monospace";
  const hairline = cssVal("--hairline"), mutedInk = cssVal("--muted");
  days.forEach((k, r) => {
    const y = r * (rowH + gap) + 2;
    ctx.fillStyle = mutedInk;
    ctx.fillText(DOW[fromKey(k).getDay()].slice(0, 2), 0, y + rowH - 3);
    const day = S.slots[k] || {};
    for (let i = 0; i < 240; i++) {
      const cid = day[slotLabel(i)];
      if (cid) {
        const cat = catById(cid);
        ctx.fillStyle = cat ? cssVal("--c" + (cat.slot % PALN)) : hairline;
        ctx.globalAlpha = cat && catIsTex(cat) ? 0.55 : 1; // striped cats read lighter in the barcode
        ctx.fillRect(gut + i * bw, y, Math.max(bw - 0.3, 0.7), rowH);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = hairline;
        ctx.fillRect(gut + i * bw, y + rowH / 2 - 0.5, bw, 1);
      }
    }
  });
}
function copySummary() {
  const { days, catH, filled, money, media } = weekStats();
  const start = fromKey(days[0]);
  const name = S.profile.name ? S.profile.name + " — " : "";
  const top = S.categories.filter(c => catH[c.id]).sort((a, b) => catH[b.id] - catH[a.id]).slice(0, 4)
    .map(c => `${c.name} ${catH[c.id].toFixed(1)}h`).join(" · ");
  const spend = {};
  money.forEach(m => spend[m.currency] = (spend[m.currency] || 0) + m.amount);
  const byT = {};
  media.forEach(m => byT[m.type] = (byT[m.type] || 0) + 1);
  const lines = [
    `${name}Week Tracker — week of ${start.getDate()} ${MON[start.getMonth()]}`,
    `⏱ ${(filled * 0.1).toFixed(1)}h tracked (${Math.round(filled * 0.1 / 168 * 100)}% of the week)`,
    top ? `   ${top}` : null,
    money.length ? `💸 ${Object.entries(spend).map(([c, v]) => fmtMoney(v, c)).join(" + ")} across ${money.length} purchases` : null,
    media.length ? `📺 ${media.length} media items: ${Object.entries(byT).sort((a, b) => b[1] - a[1]).map(([t, n]) => `${t} ${n}`).join(", ")}` : null,
  ].filter(Boolean);
  navigator.clipboard.writeText(lines.join("\n")).then(() => toast("Summary copied — paste it to the group chat"));
}

/* ============================== export / import ============================== */
async function exportData() {
  const name = (S.profile.name || "week-tracker").toLowerCase().replace(/\s+/g, "-");
  const fn = `${name}-${dateKey(new Date())}.json`;
  const json = JSON.stringify(S, null, 1);
  /* text/plain, not application/json: iOS won't share JSON files but shares text files fine */
  const blob = new Blob([json], { type: "text/plain" });
  const clipFallback = async (err) => {
    try { await navigator.clipboard.writeText(json); toast("Sharing isn't supported here — your data was copied to the clipboard instead. Paste it into Notes to keep a backup.", 6000); }
    catch (e2) { toast("Export failed: " + ((err && err.name) || "unknown error"), 5000); }
  };
  if (navigator.canShare && navigator.canShare({ files: [new File([blob], fn, { type: "text/plain" })] })) {
    try { await navigator.share({ files: [new File([blob], fn, { type: "text/plain" })], title: "Week Tracker data" }); return; }
    catch (err) {
      if (err && err.name === "AbortError") return; // user closed the share sheet
      await clipFallback(err); return;
    }
  }
  try {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = fn;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    toast("Downloaded " + fn);
  } catch (err) { await clipFallback(err); }
}
function applyImportText(txt, mode) {
  let inc = null;
  try { inc = JSON.parse(txt); } catch (e) {}
  if (!inc || inc.v !== 1) { toast("That doesn't look like Week Tracker data"); return; }
  if (mode === "replace") S = inc;
  else S = mergeStores(S, inc);
  save(); renderAll(); closeSheet(); toast("Import done");
}
function importData(file, mode) {
  file.text().then(txt => applyImportText(txt, mode)).catch(() => toast("Couldn't read that file"));
}
function mergeStores(a, b) {
  const out = JSON.parse(JSON.stringify(a));
  out.deleted = [...new Set([...(a.deleted || []), ...(b.deleted || [])])];
  (b.categories || []).forEach(c => { if (!out.categories.some(x => x.id === c.id)) out.categories.push(c); });
  Object.keys(b.slots || {}).forEach(k => {
    if (!out.slots[k] || (b.slotsMeta?.[k] || 0) > (out.slotsMeta?.[k] || 0)) {
      out.slots[k] = b.slots[k]; out.slotsMeta[k] = b.slotsMeta?.[k] || Date.now();
    }
  });
  ["money", "media"].forEach(key => {
    (b[key] || []).forEach(e => {
      const mine = out[key].find(x => x.id === e.id);
      if (!mine) out[key].push(e);
      else if ((e.up || 0) > (mine.up || 0)) Object.assign(mine, e);
    });
    out[key] = out[key].filter(e => !out.deleted.includes(e.id));
  });
  if (!out.profile.name && b.profile?.name) out.profile.name = b.profile.name;
  return out;
}

/* ============================== gist sync ============================== */
function gistCfg() {
  return { id: localStorage.getItem("tenths.gist.id") || "", token: localStorage.getItem("tenths.gist.token") || "" };
}
let syncTimer = null;
function scheduleSync() {
  const { id, token } = gistCfg();
  if (!id || !token) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncNow(true), 45000);
}
async function syncNow(quiet) {
  const { id, token } = gistCfg();
  if (!id || !token) { toast("Add a gist ID and token in Settings first"); return; }
  try {
    const hdrs = { Authorization: "Bearer " + token, Accept: "application/vnd.github+json" };
    const r = await fetch("https://api.github.com/gists/" + id, { headers: hdrs });
    if (!r.ok) throw new Error("fetch " + r.status);
    const g = await r.json();
    const f = g.files["tenths.json"];
    if (f && f.content) {
      let remote = null;
      try { remote = JSON.parse(f.truncated ? await (await fetch(f.raw_url)).text() : f.content); } catch (e) {}
      if (remote && remote.v === 1) S = mergeStores(S, remote);
    }
    S.meta.updatedAt = Date.now();
    localStorage.setItem(LSKEY, JSON.stringify(S));
    const w = await fetch("https://api.github.com/gists/" + id, {
      method: "PATCH", headers: hdrs,
      body: JSON.stringify({ files: { "tenths.json": { content: JSON.stringify(S) } } }),
    });
    if (!w.ok) throw new Error("write " + w.status);
    localStorage.setItem("tenths.gist.last", String(Date.now()));
    renderAll();
    if (!quiet) toast("Synced");
  } catch (err) {
    if (!quiet) toast("Sync failed — check gist ID / token");
  }
}

/* refresh the "now" marker every minute */
setInterval(() => { if (tab === "track" && dateKey(selDate) === dateKey(new Date())) renderTape(); }, 60000);
/* pull remote changes when returning to the app */
document.addEventListener("visibilitychange", () => { if (!document.hidden) { const { id, token } = gistCfg(); if (id && token) syncNow(true); } });
(function firstRun() {
  if (!localStorage.getItem(LSKEY)) save();
  const { id, token } = gistCfg(); if (id && token) syncNow(true);
})();

if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost"))
  navigator.serviceWorker.register("sw.js").catch(() => {});

window.addEventListener("error", (e) => { document.documentElement.dataset.jserror = "1"; });
/* layout debug: ?vw=390 constrains the app column for narrow-screen testing */
const dbgVw = new URLSearchParams(location.search).get("vw");
if (dbgVw) { $("#app").style.maxWidth = dbgVw + "px"; renderAll(); }
document.documentElement.dataset.booted = "1";
</script>
</body>
</html>
